<div class="page-header">
  <h2>Planes</h2>
  <button mat-raised-button color="primary" (click)="abrirFormulario()">
    <mat-icon>add</mat-icon> Nuevo Plan
  </button>
</div>

<mat-card>
  <mat-card-content>
    <table mat-table [dataSource]="planes" class="full-width">

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let p">{{ p.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="precio">
        <th mat-header-cell *matHeaderCellDef>Precio</th>
        <td mat-cell *matCellDef="let p">{{ p.precio | currency:'COP':'symbol':'1.0-0' }}</td>
      </ng-container>

      <ng-container matColumnDef="duracion">
        <th mat-header-cell *matHeaderCellDef>Duración</th>
        <td mat-cell *matCellDef="let p">{{ p.duracion }} días</td>
      </ng-container>

      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let p">{{ p.descripcion || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let p">
          <button mat-icon-button color="primary" matTooltip="Editar" (click)="abrirFormulario(p)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="eliminar(p)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas;"></tr>

    </table>

    <p *ngIf="!cargando && planes.length === 0" class="empty">No hay planes registrados.</p>
  </mat-card-content>
</mat-card>
