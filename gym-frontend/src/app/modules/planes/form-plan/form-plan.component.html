<h2 mat-dialog-title>{{ esEdicion ? 'Editar' : 'Nuevo' }} Plan</h2>

<mat-dialog-content [formGroup]="form">

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Nombre</mat-label>
    <input matInput formControlName="nombre" placeholder="Ej: Plan Básico">
    <mat-error *ngIf="form.get('nombre')?.hasError('required')">El nombre es obligatorio</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Precio (COP)</mat-label>
    <input matInput type="number" formControlName="precio" placeholder="80000">
    <mat-error *ngIf="form.get('precio')?.hasError('required')">El precio es obligatorio</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Duración (días)</mat-label>
    <input matInput type="number" formControlName="duracion" placeholder="30">
    <mat-error *ngIf="form.get('duracion')?.hasError('required')">La duración es obligatoria</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Descripción</mat-label>
    <textarea matInput formControlName="descripcion" rows="3" placeholder="Beneficios del plan..."></textarea>
  </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="guardar()" [disabled]="form.invalid">
    {{ esEdicion ? 'Actualizar' : 'Crear' }}
  </button>
</mat-dialog-actions>
