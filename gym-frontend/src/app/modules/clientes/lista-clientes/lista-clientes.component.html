<div class="page-header">
  <h2>Clientes</h2>
  <div class="header-actions">
    <button mat-stroked-button color="primary" (click)="abrirFormulario(undefined!)"
            matTooltip="Solo datos del cliente, sin plan">
      <mat-icon>person_add</mat-icon> Solo Cliente
    </button>
    <button mat-raised-button color="primary" (click)="abrirRegistroCompleto()"
            matTooltip="Registrar cliente y asignar plan en un solo paso">
      <mat-icon>assignment_turned_in</mat-icon> Cliente + Plan
    </button>
  </div>
</div>

<mat-card>
  <mat-card-content>
    <table mat-table [dataSource]="clientes" class="full-width">

      <ng-container matColumnDef="cc">
        <th mat-header-cell *matHeaderCellDef>CC</th>
        <td mat-cell *matCellDef="let c">{{ c.cc }}</td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let c">{{ c.nombre1 }} {{ c.apellido1 }}</td>
      </ng-container>

      <ng-container matColumnDef="telefono">
        <th mat-header-cell *matHeaderCellDef>Teléfono</th>
        <td mat-cell *matCellDef="let c">{{ c.telefono || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="correo">
        <th mat-header-cell *matHeaderCellDef>Correo</th>
        <td mat-cell *matCellDef="let c">{{ c.correo || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="fechaRegistro">
        <th mat-header-cell *matHeaderCellDef>Registro</th>
        <td mat-cell *matCellDef="let c">{{ c.fechaRegistro | date:'dd/MM/yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let c">
          <button mat-icon-button color="primary" matTooltip="Editar" (click)="abrirFormulario(c)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="eliminar(c)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
    </table>

    <p *ngIf="clientes.length === 0" class="empty">No hay clientes registrados.</p>
  </mat-card-content>
</mat-card>
