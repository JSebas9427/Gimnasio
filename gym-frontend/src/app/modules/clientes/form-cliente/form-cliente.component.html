<h2 mat-dialog-title>{{ esEdicion ? 'Editar' : 'Nuevo' }} Cliente</h2>
<mat-dialog-content [formGroup]="form">
  <div class="row">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Cédula (CC)</mat-label>
      <input matInput type="number" formControlName="cc">
      <mat-error *ngIf="form.get('cc')?.hasError('required')">La CC es obligatoria</mat-error>
    </mat-form-field>
  </div>
  <div class="row two-col">
    <mat-form-field appearance="outline">
      <mat-label>Primer Nombre</mat-label>
      <input matInput formControlName="nombre1">
      <mat-error *ngIf="form.get('nombre1')?.hasError('required')">Obligatorio</mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Segundo Nombre</mat-label>
      <input matInput formControlName="nombre2">
    </mat-form-field>
  </div>
  <div class="row two-col">
    <mat-form-field appearance="outline">
      <mat-label>Primer Apellido</mat-label>
      <input matInput formControlName="apellido1">
      <mat-error *ngIf="form.get('apellido1')?.hasError('required')">Obligatorio</mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Segundo Apellido</mat-label>
      <input matInput formControlName="apellido2">
    </mat-form-field>
  </div>
  <div class="row two-col">
    <mat-form-field appearance="outline">
      <mat-label>Teléfono</mat-label>
      <input matInput formControlName="telefono">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Correo</mat-label>
      <input matInput formControlName="correo">
      <mat-error *ngIf="form.get('correo')?.hasError('email')">Correo inválido</mat-error>
    </mat-form-field>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="guardar()" [disabled]="form.invalid">
    {{ esEdicion ? 'Actualizar' : 'Crear' }}
  </button>
</mat-dialog-actions>
